name: Publish to PyPI [Test]
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-pypi:
    name: Create patch version number and push to test-pypi
    runs-on: ubuntu-latest
    steps:
      #----------------------------------------------
      #       check-out repo and set-up python
      #----------------------------------------------
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.10"
      #----------------------------------------------
      #  -----  install & configure poetry  -----
      #----------------------------------------------
      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1
        with:
          version: "2.2.1"
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true
      #----------------------------------------------
      #       load cached venv if cache exists
      #----------------------------------------------
      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ github.event.repository.name }}-${{ hashFiles('**/poetry.lock') }}
      #----------------------------------------------
      # install dependencies if cache does not exist
      #----------------------------------------------
      - name: Install Kerberos system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libkrb5-dev
      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root
      #----------------------------------------------
      # Get the current version and increment it (test-pypi requires a unique version number)
      #----------------------------------------------
      - name: Get next version
        uses: reecetech/version-increment@ddbbe72b7f76a996076fabfdce21a16384e8644a # 2022.2.4
        id: version
        with:
          scheme: semver
          increment: patch
      #----------------------------------------------
      # Tell poetry to update the version number
      #----------------------------------------------
      - name: Update pyproject.toml
        run: poetry version ${{ steps.version.outputs.major-version }}.${{ steps.version.outputs.minor-version }}.dev$(date +%s)
      #----------------------------------------------
      # Build the package (before publish action)
      #----------------------------------------------
      - name: Build package
        run: poetry build
      #----------------------------------------------
      # Configure test-pypi repository
      #----------------------------------------------
      - name: Configure test-pypi repository
        run: poetry config repositories.testpypi https://test.pypi.org/legacy/
      #----------------------------------------------
      # Attempt push to test-pypi
      #----------------------------------------------
      - name: Publish to test-pypi
        run: poetry publish --username __token__ --password ${{ secrets.TEST_PYPI_TOKEN }} --repository testpypi
